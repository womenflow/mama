<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Seven gentle pregnancy moves and three golden rules">
  <rect x="0" y="0" width="720" height="470" fill="#ffffff"/>
  <text x="36" y="42" font-size="24" font-weight="700" fill="#1a1a1a">Safe Summer Pregnancy Movement</text>
  <text x="36" y="65" font-size="14" fill="#6b7280">Gentle moves to beat swelling and stay cool · check with your provider first</text>
  <!-- golden rules -->
  <rect x="36" y="86" width="648" height="66" rx="10" fill="#fbeef2" stroke="#f3d4de"/>
  <text x="52" y="110" font-size="14" font-weight="700" fill="#b13a63">3 Golden Rules</text>
  <text x="52" y="134" font-size="12.5" fill="#7d3050">💧 Hydrate more than feels necessary   ·   🌤 Move in the cool hours   ·   🧘 Listen to your body — stop if dizzy</text>
  <!-- 7 moves grid -->
  <g font-size="13" fill="#1a1a1a">
    <rect x="36" y="166" width="315" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="58" cy="183" r="10" fill="#c65b86"/><text x="58" y="187" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="76" y="187">Ankle Circles — fights swelling</text>
    <rect x="369" y="166" width="315" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="391" cy="183" r="10" fill="#c65b86"/><text x="391" y="187" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="409" y="187">Seated Marching — circulation</text>
    <rect x="36" y="210" width="315" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="58" cy="227" r="10" fill="#c65b86"/><text x="58" y="231" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="76" y="231">Gentle Cat-Cow — eases back</text>
    <rect x="369" y="210" width="315" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="391" cy="227" r="10" fill="#c65b86"/><text x="391" y="231" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="409" y="231">Wall Push-Ups — upper body</text>
    <rect x="36" y="254" width="315" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="58" cy="271" r="10" fill="#c65b86"/><text x="58" y="275" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="76" y="275">Side-Lying Leg Lifts — hips</text>
    <rect x="369" y="254" width="315" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="391" cy="271" r="10" fill="#c65b86"/><text x="391" y="275" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="409" y="275">A Shaded Walk — 10–15 min</text>
    <rect x="36" y="298" width="648" height="34" rx="8" fill="#fdf5f8" stroke="#f3d4de"/>
    <circle cx="58" cy="315" r="10" fill="#c65b86"/><text x="58" y="319" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">7</text>
    <text x="76" y="319">Deep Breathing + Gentle Stretch — reach overhead, five slow breaths</text>
  </g>
  <rect x="36" y="348" width="648" height="30" rx="8" fill="#fbeef2"/>
  <text x="360" y="368" font-size="13.5" font-weight="700" fill="#b13a63" text-anchor="middle">Go slow · stay cool · drink the water · be kind to your body</text>
</svg>